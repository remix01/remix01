name: OpenAPI spec check

on:
  pull_request:
    paths:
      - 'app/api/**'
      - 'lib/api/schemas/**'
      - 'lib/openapi/**'
      - 'scripts/generate-openapi.ts'
      - 'docs/openapi.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'app/api/**'
      - 'lib/api/schemas/**'
      - 'lib/openapi/**'
      - 'scripts/generate-openapi.ts'
      - 'docs/openapi.json'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Avoid intermittent failures in pnpm/action-setup on hosted runners by
      # activating a pinned pnpm via Corepack after Node is installed.
      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI and check drift
        run: pnpm openapi:check
