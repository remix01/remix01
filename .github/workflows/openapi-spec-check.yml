name: OpenAPI spec check

on:
  pull_request:
    paths:
      - 'app/api/**'
      - 'lib/api/schemas/**'
      - 'lib/openapi/**'
      - 'scripts/generate-openapi.ts'
      - 'docs/openapi.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'app/api/**'
      - 'lib/api/schemas/**'
      - 'lib/openapi/**'
      - 'scripts/generate-openapi.ts'
      - 'docs/openapi.json'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI and check drift
        run: pnpm openapi:check
