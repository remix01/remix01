name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

permissions:
  contents: read
  deployments: write

jobs:
  deploy-migrations:
    name: Deploy Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check for pending migrations
        run: |
          MIGRATIONS=$(find supabase/migrations -name "*.sql" | wc -l)
          echo "Found $MIGRATIONS migration files"

      - name: Deploy migrations to production
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Migrations deployed successfully to project ${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Database migration failed! Check Supabase dashboard for details."
          echo "Project ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
