name: Notify Vercel

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Vercel deployment status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - v0-liftgo-platform-concept - lint
