name: Notify Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Notify Vercel deployment status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - v0-liftgo-platform-concept - lint
