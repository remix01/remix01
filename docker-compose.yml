version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - build_env
    container_name: liftgo-app
    # Don't expose port directly - use Nginx reverse proxy
    # ports:
    #   - "3000:3000"
    expose:
      - "3000"
    environment:
      # Load from .env file
      - NODE_ENV=production
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      # Storage provider selection: 'minio' or 'supabase'
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-supabase}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Optional: mount for logs
      - ./logs:/app/logs
    networks:
      - liftgo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: liftgo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot:/etc/letsencrypt:ro
    depends_on:
      - app
      - minio
    networks:
      - liftgo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: liftgo-redis
    # PRODUCTION: Don't expose port 6379 - use internal network only
    # ports:
    #   - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
      --bind 0.0.0.0
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    volumes:
      # Persistent storage
      - redis-data:/data
    networks:
      - liftgo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── MinIO Object Storage ────────────────────────────────────────────────────
  # S3-compatible storage for user uploads (images, videos, audio, documents).
  # In production this sits behind Nginx; the Console (port 9001) is NOT exposed.
  minio:
    image: minio/minio:latest
    container_name: liftgo-minio
    # API: 9000 (proxied by Nginx at /storage/ or storage.liftgo.net)
    # Console: 9001 – access via SSH tunnel only in production
    #   ssh -L 9001:localhost:9001 user@server
    expose:
      - "9000"
      - "9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me_in_production}
      # Site name used in audit logs
      MINIO_SITE_NAME: liftgo-storage
      # Enable audit logging to stdout
      MINIO_AUDIT_WEBHOOK_ENABLE: "off"
    volumes:
      - minio-data:/data
    networks:
      - liftgo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # MinIO bucket initialisation – runs once at startup then exits.
  # Creates buckets, sets policies and the application service account.
  minio-init:
    image: minio/mc:latest
    container_name: liftgo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me_in_production}
      # Application service account (non-root) – set these in .env
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
    volumes:
      - ./scripts/minio-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - liftgo
    restart: "no"

networks:
  liftgo:
    driver: bridge

volumes:
  redis-data:
    driver: local
  minio-data:
    driver: local

secrets:
  build_env:
    file: .env.build

