<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — LiftGO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }
    .container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 48px 40px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 { color: #0f172a; margin-bottom: 12px; font-size: 24px; font-weight: 700; }
    p { color: #64748b; margin-bottom: 32px; line-height: 1.6; font-size: 15px; }
    button { background: #0d9488; color: white; border: none; padding: 14px 32px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; width: 100%; }
    button:hover { background: #0f766e; }
    .logo { color: #0d9488; font-weight: 800; font-size: 20px; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">LiftGO</div>
      <div class="icon">📡</div>
      <h1>Ni internetne povezave</h1>
      <p>Preverite svojo internetno povezavo in poskusite znova.</p>
      <button onclick="window.location.reload()">Poskusi znova</button>
    </div>
  </div>
</body>
</html>
